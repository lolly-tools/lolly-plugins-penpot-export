# Build the plugin and publish dist/ to GitHub Pages.
#
# The bundle imports the Lolly engine + web-shell bridge modules from a SIBLING
# checkout (see vite.config.ts), so the job clones the public lolly repo next
# to this one and installs both before building. GitHub Pages serves with
# `Access-Control-Allow-Origin: *`, which is what Penpot's plugin loader needs;
# users install from:
#   https://lolly-tools.github.io/lolly-plugins-penpot-export/manifest.json
#
# One-time repo setting: Settings → Pages → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lolly-plugins-penpot-export

      # Sibling lolly checkout — SOURCE FILES ONLY. The bundle needs the
      # engine + web-shell bridge .ts sources; both runtime npm deps (idb,
      # harfbuzzjs) are dependencies of THIS repo and vite-aliased to its
      # node_modules, so lolly is never npm-installed here. Only the
      # shells/web submodule is initialised — a recursive init would drag in
      # every subrepo and break on any parent-pointer drift.
      - uses: actions/checkout@v4
        with:
          repository: lolly-tools/lolly
          path: lolly

      - name: Init shells/web submodule
        working-directory: lolly
        run: git submodule update --init shells/web

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install plugin deps
        working-directory: lolly-plugins-penpot-export
        run: npm install

      # No typecheck here: tsc follows type-only imports into the web shell's
      # export.ts, whose type graph needs lolly's full node_modules. Typecheck
      # runs locally where the sibling workspace is installed.
      - name: Build
        working-directory: lolly-plugins-penpot-export
        run: LOLLY_DIR="$GITHUB_WORKSPACE/lolly" npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: lolly-plugins-penpot-export/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
